services:
  postgres-users:
    image: postgres:16
    container_name: schoolinc_postgres_users
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schoolinc_users
    ports:
      - "5433:5432"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-classes:
    image: postgres:16
    container_name: schoolinc_postgres_classes
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schoolinc_classes
    ports:
      - "5434:5432"
    volumes:
      - postgres_classes_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-grades:
    image: postgres:16
    container_name: schoolinc_postgres_grades
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schoolinc_grades
    ports:
      - "5435:5432"
    volumes:
      - postgres_grades_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: schoolinc_user_service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres-users:5432/schoolinc_users?schema=public
      JWT_SECRET: ${JWT_SECRET:-schoolinc_jwt_secret}
    depends_on:
      postgres-users:
        condition: service_healthy

  class-service:
    build:
      context: .
      dockerfile: apps/class-service/Dockerfile
    container_name: schoolinc_class_service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres-classes:5432/schoolinc_classes?schema=public
      JWT_SECRET: ${JWT_SECRET:-schoolinc_jwt_secret}
    depends_on:
      postgres-classes:
        condition: service_healthy

  grade-service:
    build:
      context: .
      dockerfile: apps/grade-service/Dockerfile
    container_name: schoolinc_grade_service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@postgres-grades:5432/schoolinc_grades?schema=public
      JWT_SECRET: ${JWT_SECRET:-schoolinc_jwt_secret}
    depends_on:
      postgres-grades:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: schoolinc_gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      USER_SERVICE_URL: http://user-service:3001/graphql
      CLASS_SERVICE_URL: http://class-service:3002/graphql
      GRADE_SERVICE_URL: http://grade-service:3003/graphql
    depends_on:
      - user-service
      - class-service
      - grade-service

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: schoolinc_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - gateway

volumes:
  postgres_users_data:
  postgres_classes_data:
  postgres_grades_data: